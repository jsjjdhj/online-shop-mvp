spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shop_prod?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: root
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

logging:
  level:
    com.shop: warn

server:
  port: 8080

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
