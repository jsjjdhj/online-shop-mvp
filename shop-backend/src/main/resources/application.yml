server:
  port: 8080

spring:
  application:
    name: shop-backend
  datasource:
    url: jdbc:mysql://localhost:3306/shop_dev?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 20161220
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: YOUR_BASE64_ENCODED_SECRET_KEY_HERE
  expiration: 86400000

logging:
  level:
    com.shop: debug
  file:
    path: logs/
    name: logs/shop-backend.log
